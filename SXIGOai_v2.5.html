<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="SXIGO AI v2.5 - Premium AI Assistant">
    <title>SXIGOai v2.5 · Premium AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--primary:#667eea;--dark:#764ba2;--secondary:#f093fb;--danger:#ff453a;--success:#30d158;--bg:#000;--bg2:#060608;--bg3:#0c0c10;--text:#f0f0f4;--text2:#88889a;--text3:#666678;--shadow:0 8px 24px rgba(0,0,0,.24);--radius:12px}
        html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
        body{background:#000;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden;height:100dvh;display:flex;align-items:center;justify-content:center}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(102,126,234,.3);border-radius:3px}
        .bg-gradient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
        .bg-gradient::before{content:'';position:absolute;inset:-60%;background:conic-gradient(from 0deg at 50% 50%,rgba(102,126,234,.1),rgba(118,75,162,.1),rgba(240,147,251,.1),rgba(102,126,234,.1));animation:rotate 40s linear infinite}
        @keyframes rotate{to{transform:rotate(360deg)}}
        .container{position:relative;z-index:1;width:100%;height:100dvh;display:flex;flex-direction:column;background:var(--bg2);max-width:600px;border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
        @media(max-width:768px){.container{max-width:100%;border-radius:0}}
        .header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:rgba(6,6,8,.8);backdrop-filter:blur(30px);border-bottom:1px solid rgba(102,126,234,.1);min-height:56px;flex-shrink:0}
        .header h1{font-size:18px;font-weight:700;color:var(--primary);letter-spacing:-.5px}
        .header-actions{display:flex;gap:4px}
        .btn{width:40px;height:40px;border-radius:var(--radius);border:none;background:0;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
        .btn:hover{background:rgba(102,126,234,.1);color:var(--text)}
        .status-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg3);border-bottom:1px solid rgba(102,126,234,.05);font-size:11px;color:var(--text3);flex-shrink:0}
        .status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 6px rgba(48,209,88,.4)}
        .model-selector{-webkit-appearance:none;appearance:none;background:rgba(102,126,234,.1);border:1px solid rgba(102,126,234,.15);border-radius:8px;color:var(--text);font-size:10px;padding:4px 8px;cursor:pointer;margin-left:auto}
        .messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
        .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:32px 16px;animation:fadeIn .6s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .welcome-icon{width:64px;height:64px;border-radius:var(--radius);background:linear-gradient(135deg,var(--primary),var(--dark));display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 24px rgba(102,126,234,.3);animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .welcome h2{font-size:24px;font-weight:700;color:var(--text)}
        .welcome p{font-size:14px;color:var(--text2);line-height:1.5;max-width:280px}
        .welcome-chips{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
        .chip{padding:6px 14px;border-radius:20px;border:1px solid rgba(102,126,234,.2);background:rgba(102,126,234,.08);color:var(--text2);font-size:11px;cursor:pointer;transition:all .12s}
        .chip:hover{background:rgba(102,126,234,.15);color:var(--text);transform:translateY(-2px)}
        .message{display:flex;gap:12px;margin-bottom:8px;animation:slideUp .3s ease}
        @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message.user{flex-direction:row-reverse}
        .avatar{width:32px;height:32px;min-width:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:linear-gradient(135deg,var(--primary),var(--dark));box-shadow:0 2px 8px rgba(102,126,234,.2)}
        .message.assistant .avatar{background:linear-gradient(135deg,var(--secondary),var(--dark))}
        .message-content{max-width:70%;display:flex;flex-direction:column;gap:4px}
        .message-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-wrap:break-word}
        .message.user .message-bubble{background:linear-gradient(135deg,var(--primary),var(--dark));color:#fff;border-bottom-right-radius:2px}
        .message.assistant .message-bubble{background:rgba(102,126,234,.12);color:var(--text);border:1px solid rgba(102,126,234,.15);border-bottom-left-radius:2px}
        .message-time{font-size:10px;color:#555;opacity:.5}
        .typing{display:flex;gap:4px;padding:8px 0;align-items:center}
        .typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bounce 1.4s ease-in-out infinite}
        .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
        @keyframes bounce{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.2)}}
        .input-area{padding:12px 16px 16px;background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.6) 100%);flex-shrink:0;border-top:1px solid rgba(102,126,234,.05)}
        .input-wrapper{display:flex;align-items:flex-end;gap:8px;background:rgba(102,126,234,.08);backdrop-filter:blur(20px);border:1px solid rgba(102,126,234,.15);border-radius:24px;padding:4px;transition:all .12s}
        .input-wrapper:focus-within{border-color:rgba(102,126,234,.3);background:rgba(102,126,234,.12)}
        .input-field{flex:1;background:0;border:none;outline:none;color:var(--text);font-size:15px;resize:none;max-height:100px;line-height:1.4;padding:8px 12px;caret-color:var(--primary)}
        .input-field::placeholder{color:#555}
        .send-btn{width:34px;height:34px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--primary),var(--dark));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:4px;box-shadow:0 4px 12px rgba(102,126,234,.3);transition:all .12s}
        .send-btn:hover{transform:scale(1.05);box-shadow:0 6px 18px rgba(102,126,234,.4)}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:rgba(12,12,16,.97);backdrop-filter:blur(30px);z-index:99;transform:translateX(-100%);transition:transform .3s;border-right:1px solid rgba(102,126,234,.05);overflow-y:auto}
        .sidebar.open{transform:translateX(0)}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98;opacity:0;pointer-events:none;transition:opacity .3s}
        .overlay.open{opacity:1;pointer-events:auto}
        .modal{position:fixed;left:0;bottom:0;width:100%;max-height:85dvh;background:rgba(18,18,22,.97);backdrop-filter:blur(40px);border-radius:16px 16px 0 0;z-index:101;transform:translateY(100%);transition:transform .3s;overflow-y:auto;border-top:1px solid rgba(102,126,234,.05)}
        .modal.open{transform:translateY(0)}
        .modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(102,126,234,.15);margin:16px auto 16px}
        .modal-header{padding:0 16px 12px;display:flex;align-items:center;justify-content:space-between}
        .modal-header h2{font-size:18px;font-weight:700;color:var(--text)}
        .modal-close{width:32px;height:32px;border-radius:8px;border:none;background:rgba(102,126,234,.1);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
        .modal-body{padding:0 16px 16px;display:flex;flex-direction:column;gap:16px}
        .setting-group{display:flex;flex-direction:column;gap:8px}
        .setting-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase}
        .setting-input,.setting-select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(102,126,234,.15);background:rgba(102,126,234,.08);color:var(--text);font-size:13px;transition:all .12s}
        .setting-input:focus,.setting-select:focus{outline:none;border-color:rgba(102,126,234,.4);background:rgba(102,126,234,.12)}
        .slider{display:flex;align-items:center;gap:12px}
        .slider-input{flex:1;height:4px;border-radius:2px;background:rgba(102,126,234,.2);outline:none;-webkit-appearance:none}
        .slider-input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--primary);cursor:pointer;box-shadow:0 2px 8px rgba(102,126,234,.3)}
        .slider-value{min-width:40px;text-align:center;font-size:12px;color:var(--text);font-weight:600}
        .theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
        .theme-btn{aspect-ratio:1;border-radius:12px;border:2px solid transparent;cursor:pointer;transition:all .12s;background:linear-gradient(135deg,var(--primary),var(--dark))}
        .theme-btn:hover{transform:scale(1.05)}.theme-btn.active{border-color:#fff;transform:scale(1.1);box-shadow:0 0 16px rgba(102,126,234,.4)}
        .toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px}
        .toast{padding:10px 16px;border-radius:12px;font-size:12px;background:rgba(18,18,22,.95);backdrop-filter:blur(20px);border:1px solid rgba(102,126,234,.15);color:var(--text);animation:slideDown .3s ease}
        @keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="header">
            <button class="btn" onclick="toggleSidebar()">☰</button>
            <h1>SXIGOai v2.5</h1>
            <div class="header-actions">
                <button class="btn" onclick="toggleSettings()">⚙</button>
                <button class="btn" onclick="newChat()">✕</button>
            </div>
        </div>
        <div class="status-bar">
            <span class="status-dot" id="status"></span>
            <span>Online</span>
            <select class="model-selector" id="modelSelect" onchange="changeModel()">
                <option value="qwen2.5-coder:7b">Qwen 2.5 7B</option>
                <option value="llama3:latest">Llama 3</option>
            </select>
        </div>
        <div class="messages" id="messages">
            <div class="welcome">
                <div class="welcome-icon">✨</div>
                <h2>SXIGOai v2.5</h2>
                <p>Premium AI Assistant · 6x Faster · 4GB Optimized</p>
                <div class="welcome-chips">
                    <button class="chip" onclick="sendMessage('Hello!')">Hello</button>
                    <button class="chip" onclick="sendMessage('What is AI?')">What is AI?</button>
                    <button class="chip" onclick="sendMessage('Write code')">Code</button>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" class="input-field" id="input" placeholder="Message SXIGOai..." onkeydown="handleKeyPress(event)">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>
    <div class="sidebar" id="sidebar">
        <div style="padding:16px"><h3 style="font-size:13px;color:var(--text2);text-transform:uppercase">History</h3><button onclick="toggleSidebar()" style="position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:7px;border:none;background:0;color:var(--text2);cursor:pointer">✕</button></div>
    </div>
    <div class="overlay" id="overlay" onclick="closeAllPanels()"></div>
    <div class="modal" id="settingsModal">
        <div class="modal-handle"></div>
        <div class="modal-header"><h2>Settings</h2><button class="modal-close" onclick="toggleSettings()">✕</button></div>
        <div class="modal-body">
            <div class="setting-group">
                <label class="setting-label">Temperature</label>
                <div class="slider">
                    <input type="range" class="slider-input" id="tempSlider" min="0" max="2" step="0.1" value="0.7" onchange="updateSetting('temp')">
                    <span class="slider-value" id="tempValue">0.70</span>
                </div>
            </div>
            <div class="setting-group">
                <label class="setting-label">Top P</label>
                <div class="slider">
                    <input type="range" class="slider-input" id="topPSlider" min="0" max="1" step="0.05" value="0.9" onchange="updateSetting('topP')">
                    <span class="slider-value" id="topPValue">0.90</span>
                </div>
            </div>
            <div class="setting-group">
                <label class="setting-label">Max Tokens</label>
                <div class="slider">
                    <input type="range" class="slider-input" id="tokensSlider" min="256" max="4096" step="256" value="2048" onchange="updateSetting('tokens')">
                    <span class="slider-value" id="tokensValue">2048</span>
                </div>
            </div>
            <div class="setting-group">
                <label class="setting-label">Theme</label>
                <div class="theme-grid">
                    <button class="theme-btn active" onclick="changeTheme('default')"></button>
                    <button class="theme-btn" style="background:linear-gradient(135deg,#00b4d8,#0077b6)" onclick="changeTheme('ocean')"></button>
                    <button class="theme-btn" style="background:linear-gradient(135deg,#f72585,#b5179e)" onclick="changeTheme('sunset')"></button>
                    <button class="theme-btn" style="background:linear-gradient(135deg,#52b788,#2d6a4f)" onclick="changeTheme('forest')"></button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script>
        const API_URL='http://localhost:8765';let currentConversationId=null;let isLoading=false;let settings={model:'qwen2.5-coder:7b',temperature:.7,topP:.9,maxTokens:2048};
        document.addEventListener('DOMContentLoaded',()=>{loadSettings();checkHealth();setInterval(checkHealth,5000)});
        async function checkHealth(){try{const r=await fetch(`${API_URL}/api/health`);const d=await r.json();document.getElementById('status').style.background=d.ollama_connected?'#30d158':'#ff453a'}catch(e){document.getElementById('status').style.background='#ff453a'}}
        async function sendMessage(text=null){const input=document.getElementById('input');const msg=text||input.value.trim();if(!msg||isLoading)return;isLoading=true;input.value='';addMessage(msg,'user');addTypingIndicator();try{const r=await fetch(`${API_URL}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:settings.model,messages:[{role:'user',content:msg}],stream:true,temperature:settings.temperature,top_p:settings.topP,max_tokens:settings.maxTokens})});const reader=r.body.getReader();const decoder=new TextDecoder();let full='';const div=document.getElementById('messages');let elem=null;while(true){const {done,value}=await reader.read();if(done)break;const text=decoder.decode(value);const lines=text.split('\n');for(const line of lines){if(line.startsWith('data:')){try{const d=JSON.parse(line.slice(6));if(d.type==='chunk'){full+=d.content;if(!elem)elem=addMessage(full,'assistant');else elem.querySelector('.message-bubble').textContent=full;div.scrollTop=div.scrollHeight}}catch(e){}}}}removeTypingIndicator();showToast('Sent','success')}catch(e){removeTypingIndicator();showToast('Error','error')}isLoading=false}
        function handleKeyPress(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
        function addMessage(c,r){const div=document.getElementById('messages');const w=div.querySelector('.welcome');if(w)w.remove();const m=document.createElement('div');m.className=`message ${r}`;const a=document.createElement('div');a.className='avatar';a.textContent=r==='user'?'👤':'🤖';const cd=document.createElement('div');cd.className='message-content';const b=document.createElement('div');b.className='message-bubble';b.textContent=c;const t=document.createElement('div');t.className='message-time';t.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});cd.appendChild(b);cd.appendChild(t);m.appendChild(a);m.appendChild(cd);div.appendChild(m);div.scrollTop=div.scrollHeight;return m}
        function addTypingIndicator(){const div=document.getElementById('messages');const td=document.createElement('div');td.className='message';td.id='typing';const a=document.createElement('div');a.className='avatar';a.textContent='🤖';const cd=document.createElement('div');cd.className='message-content';const b=document.createElement('div');b.className='message-bubble';b.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';cd.appendChild(b);td.appendChild(a);td.appendChild(cd);div.appendChild(td)}
        function removeTypingIndicator(){const t=document.getElementById('typing');if(t)t.remove()}
        function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
        function toggleSettings(){document.getElementById('settingsModal').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
        function closeAllPanels(){document.getElementById('sidebar').classList.remove('open');document.getElementById('settingsModal').classList.remove('open');document.getElementById('overlay').classList.remove('open')}
        function newChat(){document.getElementById('messages').innerHTML=`<div class="welcome"><div class="welcome-icon">✨</div><h2>SXIGOai v2.5</h2><p>Premium AI Assistant · 6x Faster · 4GB Optimized</p><div class="welcome-chips"><button class="chip" onclick="sendMessage('Hello!')">Hello</button><button class="chip" onclick="sendMessage('What is AI?')">What is AI?</button><button class="chip" onclick="sendMessage('Write code')">Code</button></div></div>`}
        function updateSetting(t){if(t==='temp'){settings.temperature=parseFloat(document.getElementById('tempSlider').value);document.getElementById('tempValue').textContent=settings.temperature.toFixed(2)}else if(t==='topP'){settings.topP=parseFloat(document.getElementById('topPSlider').value);document.getElementById('topPValue').textContent=settings.topP.toFixed(2)}else if(t==='tokens'){settings.maxTokens=parseInt(document.getElementById('tokensSlider').value);document.getElementById('tokensValue').textContent=settings.maxTokens}saveSettings()}
        function changeModel(){settings.model=document.getElementById('modelSelect').value;saveSettings()}
        function changeTheme(t){console.log('Theme:',t)}
        function saveSettings(){localStorage.setItem('sxigo_settings',JSON.stringify(settings))}
        function loadSettings(){const s=localStorage.getItem('sxigo_settings');if(s){settings=JSON.parse(s);document.getElementById('modelSelect').value=settings.model;document.getElementById('tempSlider').value=settings.temperature;document.getElementById('tempValue').textContent=settings.temperature.toFixed(2);document.getElementById('topPSlider').value=settings.topP;document.getElementById('topPValue').textContent=settings.topP.toFixed(2);document.getElementById('tokensSlider').value=settings.maxTokens;document.getElementById('tokensValue').textContent=settings.maxTokens}}
        function showToast(m,t='info'){const c=document.getElementById('toastContainer');const toast=document.createElement('div');toast.className=`toast ${t}`;toast.textContent=m;c.appendChild(toast);setTimeout(()=>toast.remove(),3000)}
        document.getElementById('input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'})
    </script>
</body>
</html>
